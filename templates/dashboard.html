{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>ToDo Cloud</h2>
        <span id="userEmail" class="me-3 text-muted"></span>

        <button class="btn btn-danger" onclick="logout()">
            Logout
        </button>

    </div>

    <div class="card mb-4">

        <div class="card-body">

            <input
                id="title"
                class="form-control mb-2"
                placeholder="Task title">

            <textarea
                id="description"
                class="form-control mb-2"
                placeholder="Description"></textarea>

            <select
                id="priority"
                class="form-select mb-3">

                <option>High</option>
                <option>Medium</option>
                <option>Low</option>

            </select>

            <button
                class="btn btn-success w-100"
                onclick="addTask()">

                Add Task

            </button>

        </div>

    </div>

    <div id="tasks"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getAuth,
signOut,
onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
query,
where,
deleteDoc,
doc,
updateDoc

} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAAgxZm7GsIbkALcjm3jzZrt456jEV1Grk",
authDomain: "todo-firestore-fabianrbv.firebaseapp.com",
projectId: "todo-firestore-fabianrbv",
storageBucket: "todo-firestore-fabianrbv.firebasestorage.app",
messagingSenderId: "36284618080",
appId: "1:36284618080:web:ad01cff66b69157416fa05"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, (user) => {

    if (!user) {

        window.location = "/";

        return;

    }

    currentUser = user;

    document.getElementById("userEmail").innerText = user.email;

    loadTasks();

});

window.logout = async function(){

    await signOut(auth);

    window.location="/";

}

window.addTask = async function(){

    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const priority = document.getElementById("priority").value;

    if(title===""){
        alert("Please enter a task title.");
        return;
    }

    if(window.currentEditingId){

        await updateDoc(doc(db,"tasks",window.currentEditingId),{

            title,
            description,
            priority

        });

        window.currentEditingId = null;

        document.querySelector(".btn-success").innerText="Add Task";

    }else{

        await addDoc(collection(db,"tasks"),{

            userId:currentUser.uid,
            title,
            description,
            priority,
            completed:false

        });

    }

    document.getElementById("title").value="";
    document.getElementById("description").value="";
    document.getElementById("priority").value="High";

    loadTasks();

}

async function loadTasks(){

    const list=document.getElementById("tasks");

    list.innerHTML="";

    const q=query(
        collection(db,"tasks"),
        where("userId","==",currentUser.uid)
    );

    const snapshot=await getDocs(q);

    snapshot.forEach(task => {

    const data = task.data();

    list.innerHTML += `

        <div class="card mb-3">

            <div class="card-body">

                <h5 id="title-${task.id}">${data.title}</h5>

                <p id="description-${task.id}">${data.description}</p>

                <span class="badge ${
                    data.priority=="High"
                        ? "bg-danger"
                        : data.priority=="Medium"
                        ? "bg-warning text-dark"
                        : "bg-success"
                }">
                ${data.priority}
                </span>

                <div class="mt-3">

                    <button
                        class="btn btn-warning me-2"
                        onclick="editTask('${task.id}')">

                        Edit

                    </button>

                    <button
                        class="btn btn-danger"
                        onclick="deleteTask('${task.id}')">

                        Delete

                    </button>

                </div>

            </div>

        </div>

        `;

    });

}

window.deleteTask = async function(id){

    if(!confirm("Are you sure you want to delete this task?")){
        return;
    }

    await deleteDoc(doc(db,"tasks",id));

    loadTasks();

}
window.editTask = function(id){

    const title = document.getElementById(`title-${id}`).innerText;
    const description = document.getElementById(`description-${id}`).innerText;

    const priority = document.querySelector(`#title-${id}`)
        .parentElement
        .querySelector(".badge").innerText;

    document.getElementById("title").value = title;
    document.getElementById("description").value = description;
    document.getElementById("priority").value = priority;

    window.currentEditingId = id;

    document.querySelector(".btn-success").innerText = "Save Changes";

}

window.updateTask = async function(id){

    await updateDoc(doc(db,"tasks",id),{

        title: document.getElementById(`title-${id}`).value,
        description: document.getElementById(`description-${id}`).value,
        priority: document.getElementById(`priority-${id}`).value

    });

    loadTasks();

}

</script>

{% endblock %}
