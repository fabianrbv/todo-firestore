{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">ToDo Cloud</h2>

                <input
                    id="email"
                    type="email"
                    class="form-control mb-3"
                    placeholder="Email">

                <input
                    id="password"
                    type="password"
                    class="form-control mb-3"
                    placeholder="Password">

                <button
                    class="btn btn-primary w-100 mb-2"
                    onclick="login()">

                    Login

                </button>

                <button
                    class="btn btn-success w-100"
                    onclick="register()">

                    Create Account

                </button>

                <p
                    id="message"
                    class="text-danger mt-3 text-center">

                </p>

            </div>

        </div>

    </div>

</div>

<!-- Firebase -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword

} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyAAgxZm7GsIbkALcjm3jzZrt456jEV1Grk",
authDomain: "todo-firestore-fabianrbv.firebaseapp.com",
projectId: "todo-firestore-fabianrbv",
storageBucket: "todo-firestore-fabianrbv.firebasestorage.app",
messagingSenderId: "36284618080",
appId: "1:36284618080:web:ad01cff66b69157416fa05"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


window.register = function(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

document.getElementById("message").innerHTML="Account created successfully.";

})

.catch((error)=>{

document.getElementById("message").innerHTML=error.message;

});

}


window.login = function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

window.location="/dashboard";

})

.catch((error)=>{

document.getElementById("message").innerHTML=error.message;

});

}

</script>

{% endblock %}
